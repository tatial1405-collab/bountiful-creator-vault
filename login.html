<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Bountiful Creator Vault — Login</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0f17;color:#e8eefc}
    .card{width:min(420px,92vw);background:#111a2e;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    h1{font-size:20px;margin:0 0 6px}
    p{opacity:.85;margin:0 0 16px;line-height:1.35}
    label{display:block;font-size:13px;opacity:.9;margin:10px 0 6px}
    input{width:100%;padding:12px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:#0b1020;color:#e8eefc;font-size:16px}
    button{width:100%;margin-top:14px;padding:12px 14px;border-radius:10px;border:0;background:#2dd4bf;color:#06221d;font-weight:700;font-size:16px;cursor:pointer}
    .msg{margin-top:12px;font-size:13px;color:#ffb4b4;min-height:18px}
    .fine{margin-top:10px;font-size:12px;opacity:.7}
  </style>
</head>
<body>
  <div class="card">
    <h1>The Bountiful Creator Vault</h1>
    <p>Enter your vault password to unlock access.</p>

    <form id="loginForm">
      <label for="pw">Vault password</label>
      <input id="pw" type="password" autocomplete="current-password" required />
      <button type="submit">Unlock</button>
      <div class="msg" id="msg"></div>
      <div class="fine">Tip: once unlocked, you’ll stay signed in on this device.</div>
    </form>
  </div>

  <script>
    // 1) Set your password hash here (SHA-256 hex).
    // We'll generate this in Step 2.
    const PASSWORD_HASH = "6d74b410d9ddc587800ef16e61700ec3cc9e54a9b2fdf12054fddf0ca56164b4";

    const AUTH_KEY = "bp_vault_auth";
    const AUTH_TS  = "bp_vault_auth_ts";

    // Optional: expire after 14 days (change if you want)
    const EXPIRE_DAYS = 14;

    async function sha256Hex(str) {
      const enc = new TextEncoder().encode(str);
      const buf = await crypto.subtle.digest("SHA-256", enc);
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    }

    function isAuthed() {
      const ok = localStorage.getItem(AUTH_KEY) === "1";
      if (!ok) return false;

      const ts = parseInt(localStorage.getItem(AUTH_TS) || "0", 10);
      if (!ts) return false;

      const maxAgeMs = EXPIRE_DAYS * 24 * 60 * 60 * 1000;
      return (Date.now() - ts) < maxAgeMs;
    }

    // If already authed, go straight to vault
    if (isAuthed()) window.location.replace("/");

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.textContent = "";

      const pw = document.getElementById("pw").value.trim();
      const hashed = await sha256Hex(pw);

      if (hashed === PASSWORD_HASH) {
        localStorage.setItem(AUTH_KEY, "1");
        localStorage.setItem(AUTH_TS, String(Date.now()));
        window.location.replace("/");
      } else {
        msg.textContent = "Incorrect password. Check your purchase email and try again.";
      }
    });
  </script>
</body>
</html>
